<!DOCTYPE html>
<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css?family=Raleway" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
  integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<link rel="stylesheet" href="./css/style.css">

<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">

        <form id="regForm" class="shadow" method="post" onsubmit="return false;">
          <div class="text-danger text-center" style="font-size: 50px;"><i class="bi bi-box-arrow-right"></i></div>
          <h1 class="mt-2">Register:</h1>
          <!-- One "tab" for each step in the form: -->
          <div class="tab"><b>Name:-</b>
            <p><input placeholder="First name..." onKeyup="checkform()" type="text" class="form-control"
                oninput="this.className = ''" name="fname"></p>
            <p><input placeholder="Password..." onKeyup="checkform()" minlength="6" type="password" class="form-control"
                oninput="this.className = ''" name="lname" required></p>
          </div>
          <label for="email">...</label>
          <div class="tab form-group">Contact Info:
            <p><input placeholder="E-mail..." id="email" type="email" class="form-control is-invalid"
                oninput="this.className = ''" name="email"></p>
            <p id="result"></p>
            <p><input placeholder="Phone..." type="number" class="form-control" oninput="this.className = ''"
                name="phone"></p>
          </div>
          <div class="tab">Birthday:
            <p><input placeholder="dd" type="date" class="form-control" oninput="this.className = ''" name="dd"></p>
          </div>
          <div class="tab">Login Info:
            <p><input placeholder="Username..." type="text" class="form-control" oninput="this.className = ''"
                name="uname"></p>
            <p><input placeholder="Password..." class="form-control" oninput="this.className = ''" name="pword"
                type="password"></p>
          </div>
          <div style="overflow:auto;">
            <div class="">
              <button type="button" class="btn btn-primary" id="prevBtn" onclick="nextPrev(-1)">Previous</button>
              <button type="button" class="btn btn-danger" id="nextBtn" onclick="nextPrev(1)">Next</button>
            </div>
          </div>
          <!-- Circles which indicates the steps of the form: -->
          <div style="text-align:center;margin-top:40px;">
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
            <span class="step"></span>
          </div>
        </form>

      </div>
    </div>
  </div>

  <div class="ddiivv">
    div..
  </div>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
    integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
    crossorigin="anonymous"></script>
  <script src="./js/v.js"></script>

</body>

</html>
